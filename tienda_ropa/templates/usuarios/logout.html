{% extends "base.html" %}

{% block title %}Sesión Cerrada{% endblock title %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-6 bg-white rounded-xl">
                <h1 class="text-3xl font-bold text-gray-800 mb-4 text-center">¡Sesión Cerrada!</h1>
                
                <p class="text-gray-600 text-center mb-6">
                    Has cerrado tu sesión exitosamente. ¡Vuelve pronto!
                </p>

                <div class="flex flex-col space-y-3">
                    <!-- enlace para ir a la página principal -->
                    <a href="{% url 'rustikal:lista' %}" class="btn bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg text-center transition duration-150">
                        Ir a la Tienda
                    </a>

                    <!-- enlace para iniciar sesión de nuevo -->
                    <a href="{% url 'usuarios:login' %}" class="btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg text-center transition duration-150">
                        Iniciar Sesión de Nuevo
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
